<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Онбординг викладача — Business English Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bea-blue:#71A7EF;
    --bea-blue-deep:#2F66B5;
    --bea-raspberry:#D63056;
    --bea-pink:#E9748E;
    --bea-red:#FF2728;
    --bea-ink:#1A1A1A;
    --bea-mauve:#C1B0C0;
    --bea-grey:#D8D8D8;
    --bea-offwhite:#F8F8F8;
    --bea-white:#FFFFFF;
    --shadow-sm:0 2px 10px rgba(24,40,70,.06);
    --shadow-md:0 10px 30px rgba(24,40,70,.09);
    --shadow-lg:0 20px 50px rgba(24,40,70,.14);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:
      radial-gradient(1100px 600px at 100% -10%, #eaf2fe 0%, transparent 60%),
      radial-gradient(900px 500px at -10% 110%, #fdeef1 0%, transparent 55%),
      var(--bea-offwhite);
    color:var(--bea-ink);
  }
  h1,h2,h3,.brand-font{font-family:'Montserrat',sans-serif;}

  .app{
    display:flex;
    min-height:100vh;
  }

  /* ===== SIDEBAR ===== */
  .sidebar{
    width:288px;
    flex-shrink:0;
    background:var(--bea-white);
    border-right:1px solid #ECECEC;
    padding:26px 16px;
    display:flex;
    flex-direction:column;
    gap:3px;
    position:sticky;
    top:0;
    height:100vh;
    overflow-y:auto;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:12px;
    padding:2px 8px 20px 8px;
    margin-bottom:14px;
    cursor:pointer;
  }
  .brand .logo-badge{
    width:38px;height:38px;border-radius:12px;
    background:linear-gradient(135deg,var(--bea-blue),var(--bea-blue-deep));
    flex-shrink:0;display:flex;align-items:center;justify-content:center;
    font-size:18px;box-shadow:var(--shadow-sm);
  }
  .brand-title{font-size:14.5px;font-weight:800;color:var(--bea-blue-deep);line-height:1.25;}
  .brand-sub{font-size:11px;color:var(--bea-mauve);font-weight:600;letter-spacing:.04em;text-transform:uppercase;}

  .nav-item{
    display:flex;
    align-items:center;
    gap:11px;
    padding:10px 12px;
    border-radius:12px;
    cursor:pointer;
    font-size:13.5px;
    font-weight:600;
    color:var(--bea-ink);
    transition:background .15s, color .15s, transform .1s;
    user-select:none;
  }
  .nav-item:hover{background:#F3F6FC; transform:translateX(2px);}
  .nav-item.active{background:linear-gradient(135deg,var(--bea-blue),#8fbdf5); color:#fff; box-shadow:var(--shadow-sm);}
  .nav-num{
    width:26px;height:26px;border-radius:9px;
    background:var(--bea-offwhite);
    font-size:14px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .nav-item.active .nav-num{background:rgba(255,255,255,.25);}
  .nav-item.done .nav-num{background:#e8f6ea;}
  .nav-item.done.active .nav-num{background:rgba(255,255,255,.25);}
  .nav-check{color:#3a9247;font-weight:800;font-size:13px;}
  .nav-item.active .nav-check{color:#fff;}
  .nav-label{flex:1;}

  .nav-divider{height:1px;background:#ECECEC;margin:14px 6px;}

  .nav-test{
    display:flex;align-items:center;gap:11px;
    padding:12px;border-radius:12px;
    font-size:13.5px;font-weight:700;
    color:var(--bea-mauve);
    cursor:not-allowed;
    background:transparent;
    transition:.15s;
  }
  .nav-test.unlocked{color:var(--bea-raspberry);cursor:pointer;}
  .nav-test.unlocked:hover{background:#fdeef1; transform:translateX(2px);}
  .nav-test.active{background:linear-gradient(135deg,var(--bea-raspberry),#ef6b86); color:#fff; box-shadow:var(--shadow-sm);}
  .nav-test .nav-num{background:var(--bea-offwhite);}
  .nav-test.active .nav-num{background:rgba(255,255,255,.25);}

  .sidebar-progress{
    margin-top:auto;
    padding:16px 10px 4px 10px;
    border-top:1px solid #ECECEC;
  }
  .progress-track{
    width:100%;height:8px;border-radius:6px;
    background:#EEF1F6;
    overflow:hidden;
    margin-top:8px;
  }
  .progress-fill{
    height:100%;background:linear-gradient(90deg,var(--bea-blue),var(--bea-raspberry));
    border-radius:6px;
    transition:width .4s;
  }
  .progress-text{font-size:11.5px;color:var(--bea-mauve);font-weight:700;margin-top:2px;}

  /* ===== MAIN ===== */
  .main{
    flex:1;
    padding:44px 52px 90px;
    max-width:880px;
  }
  .eyebrow{
    display:inline-flex;align-items:center;gap:6px;
    font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
    color:var(--bea-raspberry);margin-bottom:10px;
    background:#fdeef1;padding:4px 12px;border-radius:100px;
  }
  .page-head{display:flex;align-items:flex-start;gap:16px;margin-bottom:6px;}
  .page-icon{
    width:52px;height:52px;border-radius:16px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:26px;
    box-shadow:var(--shadow-sm);
  }
  .page-title{
    font-size:27px;font-weight:800;color:var(--bea-blue-deep);
    margin:0 0 4px 0;line-height:1.25;
  }
  .page-lede{
    font-size:15px;color:#6b7280;margin:0 0 30px 0;max-width:640px;line-height:1.55;
  }

  .card{
    background:var(--bea-white);
    border:1px solid #EEF0F3;
    box-shadow:var(--shadow-sm);
    border-radius:20px;
    padding:24px 26px;
    margin-bottom:18px;
    transition:box-shadow .2s, transform .2s;
  }
  .card:hover{box-shadow:var(--shadow-md); transform:translateY(-1px);}
  .card h3{
    margin:0 0 14px 0;font-size:15px;font-weight:700;color:var(--bea-ink);
    display:flex;align-items:center;gap:10px;
  }
  .card h3 .ic{
    width:30px;height:30px;border-radius:10px;background:#eef4fe;color:var(--bea-blue-deep);
    display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;
  }
  .card.warm h3 .ic{background:#fdeef1;color:var(--bea-raspberry);}
  ul.check-list{list-style:none;margin:0;padding:0;}
  ul.check-list li{
    position:relative;padding:7px 0 7px 28px;font-size:14.5px;line-height:1.6;color:var(--bea-ink);
  }
  ul.check-list li::before{
    content:"✓";position:absolute;left:0;top:6px;width:19px;height:19px;border-radius:7px;
    background:#eaf2fe;color:var(--bea-blue-deep);font-size:11px;font-weight:800;
    display:flex;align-items:center;justify-content:center;
  }
  ul.check-list.warn li::before{content:"!";background:#fdeef1;color:var(--bea-raspberry);}

  ol.step-list{list-style:none;margin:0;padding:0;counter-reset:step;}
  ol.step-list li{
    position:relative;padding:7px 0 7px 34px;font-size:14.5px;line-height:1.6;color:var(--bea-ink);
    counter-increment:step;
  }
  ol.step-list li::before{
    content:counter(step);position:absolute;left:0;top:5px;width:22px;height:22px;border-radius:7px;
    background:var(--bea-blue-deep);color:#fff;font-size:11.5px;font-weight:800;
    display:flex;align-items:center;justify-content:center;
  }
  .sub-block{margin-top:16px;padding-top:14px;border-top:1px dashed #EEF0F3;}
  .sub-block .sub-title{font-weight:700;font-size:13.5px;color:var(--bea-blue-deep);margin-bottom:8px;}

  .pill{
    display:inline-block;font-size:11px;font-weight:700;padding:4px 12px;border-radius:100px;
    background:#eaf2fe;color:var(--bea-blue-deep);
    margin-bottom:10px;
  }
  .pill.danger{color:var(--bea-raspberry);background:#fdeef1;}
  .pill.good{color:#2e6b2f;background:#eaf7ea;}

  .callout{
    display:flex;gap:14px;align-items:flex-start;
    background:linear-gradient(135deg,#fff7f8,#fdeef1);
    border:1px solid #f6cdd9;border-radius:16px;padding:16px 18px;margin-top:6px;
  }
  .callout .callout-ic{font-size:22px;flex-shrink:0;line-height:1;}
  .callout b{color:var(--bea-raspberry);}

  .link-btn{
    display:inline-flex;align-items:center;gap:6px;
    font-size:13.5px;font-weight:700;color:var(--bea-blue-deep);
    text-decoration:none;border-bottom:2px solid var(--bea-blue);padding-bottom:1px;
  }

  .footer-nav{
    display:flex;justify-content:space-between;align-items:center;margin-top:30px;
  }
  .btn{
    font-family:'Inter',sans-serif;font-weight:700;font-size:14px;
    padding:13px 24px;border-radius:12px;border:none;cursor:pointer;
    transition:transform .12s, box-shadow .12s;
  }
  .btn:active{transform:scale(.97);}
  .btn-primary{background:linear-gradient(135deg,var(--bea-raspberry),#ef6b86);color:#fff;box-shadow:0 6px 18px rgba(214,48,86,.28);}
  .btn-primary:hover{box-shadow:0 8px 22px rgba(214,48,86,.4); transform:translateY(-1px);}
  .btn-ghost{background:#fff;color:var(--bea-blue-deep);border:1.5px solid #dbe6fb;}
  .btn-ghost:hover{background:#eef4fe;}
  .btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;}

  /* ===== WELCOME ===== */
  .hero{
    background:linear-gradient(135deg,var(--bea-blue-deep),var(--bea-blue) 60%, #8fbdf5);
    border-radius:26px;padding:48px 44px;color:#fff;box-shadow:var(--shadow-lg);
    position:relative;overflow:hidden;margin-bottom:30px;
  }
  .hero::after{
    content:"";position:absolute;right:-60px;top:-60px;width:220px;height:220px;border-radius:50%;
    background:rgba(255,255,255,.12);
  }
  .hero::before{
    content:"";position:absolute;right:60px;bottom:-90px;width:180px;height:180px;border-radius:50%;
    background:rgba(255,255,255,.08);
  }
  .hero-emoji{font-size:40px;margin-bottom:10px;}
  .hero h1{font-size:30px;font-weight:800;margin:0 0 10px;line-height:1.25;position:relative;}
  .hero p{font-size:15px;line-height:1.6;max-width:520px;opacity:.95;margin:0 0 22px;position:relative;}
  .hero .btn-primary{background:#fff;color:var(--bea-raspberry);box-shadow:0 8px 22px rgba(0,0,0,.15);position:relative;}
  .hero .btn-primary:hover{box-shadow:0 10px 26px rgba(0,0,0,.22);}

  .tiles{
    display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:8px;
  }
  .tile{
    background:var(--bea-white);border:1px solid #EEF0F3;border-radius:18px;padding:18px;
    display:flex;gap:12px;align-items:center;cursor:pointer;box-shadow:var(--shadow-sm);
    transition:transform .15s, box-shadow .15s;
  }
  .tile:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
  .tile .tile-ic{
    width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;
    font-size:20px;flex-shrink:0;
  }
  .tile-title{font-size:13.5px;font-weight:700;}
  .tile-num{font-size:11px;color:var(--bea-mauve);font-weight:700;margin-bottom:2px;}

  /* ===== QUIZ ===== */
  .quiz-progress-wrap{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
  .quiz-progress-bar{flex:1;height:9px;background:#EEF1F6;border-radius:6px;overflow:hidden;}
  .quiz-progress-fill{height:100%;background:linear-gradient(90deg,var(--bea-raspberry),var(--bea-pink));border-radius:6px;transition:width .3s;}
  .quiz-progress-label{font-size:12.5px;font-weight:700;color:var(--bea-mauve);white-space:nowrap;}

  .quiz-card{background:var(--bea-white);border:1px solid #EEF0F3;box-shadow:var(--shadow-md);border-radius:22px;padding:30px 30px 26px;}
  .quiz-section-tag{
    display:inline-block;font-size:11.5px;font-weight:700;color:var(--bea-blue-deep);
    text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;
    background:#eaf2fe;padding:4px 12px;border-radius:100px;
  }
  .quiz-q{font-size:18.5px;font-weight:700;color:var(--bea-ink);line-height:1.45;margin-bottom:6px;}
  .quiz-hint{font-size:13px;color:#7a8296;margin-bottom:18px;line-height:1.55;}
  .quiz-hint em{color:var(--bea-blue-deep);font-style:normal;font-weight:600;}

  .opt{
    display:flex;align-items:flex-start;gap:13px;
    padding:14px 17px;border:1.5px solid #EEF0F3;border-radius:14px;
    margin-bottom:10px;cursor:pointer;font-size:14.5px;line-height:1.55;
    transition:border-color .12s, background .12s, transform .1s;
    background:#fcfcfd;
  }
  .opt:hover{border-color:var(--bea-blue); transform:translateX(2px);}
  .opt.selected{border-color:var(--bea-blue-deep);background:#eef4fe;}
  .opt .mark{
    width:22px;height:22px;border-radius:50%;border:2px solid #dfe3ea;flex-shrink:0;margin-top:1px;
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;
    background:#fff;
  }
  .opt.multi .mark{border-radius:7px;}
  .opt.selected .mark{border-color:var(--bea-blue-deep);background:var(--bea-blue-deep);}

  .opt.result-correct{border-color:#4CAF50;background:#eef8ee;}
  .opt.result-correct .mark{border-color:#4CAF50;background:#4CAF50;}
  .opt.result-missed{border-color:#4CAF50;background:#fff;}
  .opt.result-missed .mark{border-color:#4CAF50;}
  .opt.result-wrong{border-color:var(--bea-raspberry);background:#fdeef1;}
  .opt.result-wrong .mark{border-color:var(--bea-raspberry);background:var(--bea-raspberry);}

  .order-list{list-style:none;margin:0;padding:0;}
  .order-item{
    display:flex;align-items:center;gap:13px;
    background:#fcfcfd;border:1.5px solid #EEF0F3;border-radius:14px;
    padding:13px 16px;margin-bottom:9px;cursor:grab;font-size:14px;
    transition:box-shadow .15s;
  }
  .order-item:hover{box-shadow:var(--shadow-sm);}
  .order-item.dragging{opacity:.4;}
  .order-item .handle{color:var(--bea-mauve);font-size:17px;}
  .order-item .pos{
    width:26px;height:26px;border-radius:50%;background:var(--bea-blue);color:#fff;
    font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .order-item.result-correct{border-color:#4CAF50;background:#eef8ee;}
  .order-item.result-wrong{border-color:var(--bea-raspberry);background:#fdeef1;}
  .order-arrows{display:flex;gap:4px;flex-shrink:0;}
  .order-arrow-btn{
    width:28px;height:28px;border-radius:8px;border:1.5px solid var(--bea-grey);background:#fff;
    color:var(--bea-blue-deep);font-size:14px;font-weight:700;cursor:pointer;
  }
  .order-arrow-btn:hover{background:#eef4fe;}
  .order-arrow-btn:disabled{opacity:.3;cursor:not-allowed;}

  textarea.quiz-text{
    width:100%;min-height:96px;border:1.5px solid #EEF0F3;border-radius:14px;
    padding:14px 16px;font-family:'Inter',sans-serif;font-size:14px;resize:vertical;background:#fcfcfd;
  }
  textarea.quiz-text:focus{outline:none;border-color:var(--bea-blue-deep);background:#fff;}

  .explain{
    margin-top:18px;padding:14px 16px;border-radius:14px;font-size:13.5px;line-height:1.55;
    display:flex;align-items:center;gap:10px;font-weight:600;
  }
  .explain.ok{background:#eaf7ea;color:#2e6b2f;}
  .explain.bad{background:#fdeef1;color:#a02040;}

  /* ===== RESULTS ===== */
  .score-hero{
    text-align:center;padding:42px 20px;
    background:linear-gradient(135deg,#fff,#fdf3f5);
    border:1px solid #f6cdd9;box-shadow:var(--shadow-md);
    border-radius:24px;margin-bottom:22px;
  }
  .score-emoji{font-size:40px;margin-bottom:6px;}
  .score-num{font-size:58px;font-weight:800;color:var(--bea-raspberry);font-family:'Montserrat',sans-serif;}
  .score-total{font-size:20px;color:var(--bea-mauve);font-weight:600;}
  .score-msg{font-size:15.5px;margin-top:12px;color:var(--bea-ink);font-weight:700;}
  .review-item{
    background:var(--bea-white);border:1px solid #EEF0F3;box-shadow:var(--shadow-sm);border-radius:16px;
    padding:16px 18px;margin-bottom:10px;
  }
  .review-item.wrong{border-left:4px solid var(--bea-raspberry);}
  .review-item.right{border-left:4px solid #4CAF50;}
  .review-q{font-weight:700;font-size:14px;margin-bottom:6px;}
  .review-a{font-size:13.5px;color:#666;line-height:1.55;}
  .review-a b{color:var(--bea-ink);}

  @media (max-width: 860px){
    .app{flex-direction:column;}
    .sidebar{width:100%;flex-direction:row;overflow-x:auto;padding:14px;gap:8px;position:relative;height:auto;}
    .brand,.sidebar-progress,.nav-divider{display:none;}
    .nav-item,.nav-test{flex-shrink:0;}
    .main{padding:26px 18px 60px;}
    .tiles{grid-template-columns:1fr;}
    .hero{padding:32px 26px;}
  }

  /* ===== GATE (name/email) ===== */
  .app.gate-mode .sidebar{display:none;}
  .app.gate-mode .main{
    max-width:100%;display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:24px;
  }
  .gate-card{
    max-width:440px;width:100%;background:var(--bea-white);border:1px solid #EEF0F3;
    box-shadow:var(--shadow-lg);border-radius:24px;padding:40px 36px;text-align:center;
  }
  .gate-card .logo-badge-big{
    width:56px;height:56px;border-radius:16px;margin:0 auto 18px;
    background:linear-gradient(135deg,var(--bea-blue),var(--bea-blue-deep));
    display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:var(--shadow-sm);
  }
  .gate-card h1{font-size:22px;font-weight:800;color:var(--bea-blue-deep);margin:0 0 8px;}
  .gate-card p{font-size:14px;color:#6b7280;line-height:1.55;margin:0 0 24px;}
  .gate-field{margin-bottom:14px;text-align:left;}
  .gate-field label{display:block;font-size:12.5px;font-weight:700;color:var(--bea-ink);margin-bottom:6px;}
  .gate-field input{
    width:100%;padding:12px 14px;border:1.5px solid #EEF0F3;border-radius:12px;
    font-family:'Inter',sans-serif;font-size:14px;background:#fcfcfd;
  }
  .gate-field input:focus{outline:none;border-color:var(--bea-blue-deep);background:#fff;}
  .gate-error{font-size:12.5px;color:var(--bea-raspberry);font-weight:600;margin:-6px 0 12px;text-align:left;min-height:16px;}
  .gate-note{font-size:11.5px;color:var(--bea-mauve);margin-top:16px;line-height:1.5;}

  .user-badge{
    display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:10px;
    background:var(--bea-offwhite);font-size:12px;font-weight:600;color:#555;margin:0 4px 10px;
  }
  .user-badge .dot{width:7px;height:7px;border-radius:50%;background:#4CAF50;flex-shrink:0;}

  .report-status{
    display:flex;align-items:center;gap:10px;padding:13px 16px;border-radius:14px;
    font-size:13.5px;font-weight:600;margin-bottom:16px;
  }
  .report-status.sending{background:#eef4fe;color:var(--bea-blue-deep);}
  .report-status.sent{background:#eaf7ea;color:#2e6b2f;}
  .report-status.failed{background:#fff8e6;color:#9a6b00;}

  /* ===== ANONYMOUS FEEDBACK ===== */
  .feedback-card{
    background:var(--bea-white);border:1px solid #EEF0F3;box-shadow:var(--shadow-sm);
    border-radius:20px;padding:22px 24px;margin-top:8px;
  }
  .feedback-card p{font-size:14px;color:#6b7280;line-height:1.55;margin:0 0 4px;}
  .stars{display:flex;gap:8px;margin:18px 0 20px;}
  .star-btn{
    font-size:30px;background:none;border:none;cursor:pointer;line-height:1;padding:0;
    filter:grayscale(1);opacity:.4;transition:transform .1s, opacity .1s, filter .1s;
  }
  .star-btn:hover{transform:scale(1.12);}
  .star-btn.active{filter:none;opacity:1;}
  .feedback-thanks{text-align:center;padding:20px 10px;}
  .feedback-thanks .emoji{font-size:38px;margin-bottom:8px;}
</style>
</head>
<body>
<div class="app" id="appRoot">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="brand" onclick="goHome()">
      <div class="logo-badge">🎓</div>
      <div>
        <div class="brand-title">Business English<br>Academy</div>
        <div class="brand-sub">Онбординг викладача</div>
      </div>

const main = document.getElementById("main");
const appRoot = document.getElementById("appRoot");

/* =========================================================
   GATE — name & email before anything else
   ========================================================= */
function renderGateView(){
  appRoot.classList.add("gate-mode");
  main.innerHTML = `
    <div class="gate-card">
      <div class="logo-badge-big">🎓</div>
      <h1>Вітаємо в BEA! 👋</h1>
      <p>Щоб розпочати онбординг, будь ласка, увійдіть — вкажіть своє ім'я та email.</p>
      <div class="gate-field">
        <label>Ім'я та прізвище</label>
        <input type="text" id="gateName" placeholder="Напр. Олена Ковальчук" value="${userName}">
      </div>
      <div class="gate-field">
        <label>Email</label>
        <input type="email" id="gateEmail" placeholder="name@example.com" value="${userEmail}">
      </div>
      <div class="gate-error" id="gateError"></div>
      <button class="btn btn-primary" style="width:100%;" onclick="submitGate()">Продовжити →</button>
    </div>
  `;
  document.getElementById("gateName").focus();
}

function submitGate(){
  const name = document.getElementById("gateName").value.trim();
  const email = document.getElementById("gateEmail").value.trim();
  const err = document.getElementById("gateError");
  const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  if(!name){ err.textContent = "Будь ласка, вкажіть ім'я."; return; }
  if(!emailOk){ err.textContent = "Вкажіть коректний email."; return; }
  userName = name;
  userEmail = email;
  appRoot.classList.remove("gate-mode");
  currentView = "welcome";
  renderAll();
  window.scrollTo(0,0);
}

/* =========================================================
   SIDEBAR RENDER
   ========================================================= */
function renderSidebar(){
  const userBadge = document.getElementById("userBadge");
  if(userBadge){
    userBadge.innerHTML = userEmail
      ? `<div class="user-badge"><span class="dot"></span>${userName} · ${userEmail}</div>`
      : "";
  }
  const navList = document.getElementById("navList");
  navList.innerHTML = sections.map((s,i)=>{
    const cls = ["nav-item"];
    if(currentView==="section" && currentSection===i) cls.push("active");
    if(visited.has(i)) cls.push("done");
    return `<div class="${cls.join(' ')}" onclick="openSection(${i})">
      <div class="nav-num">${visited.has(i) ? '<span class="nav-check">✓</span>' : s.emoji}</div>
      <div class="nav-label">${s.title}</div>
    </div>`;
  }).join("");

  const navTest = document.getElementById("navTest");
  const unlocked = visited.size === sections.length;
  navTest.classList.toggle("unlocked", unlocked);
  navTest.classList.toggle("active", currentView==="test" || currentView==="results");

  document.getElementById("progressText").textContent = `Пройдено ${visited.size} з ${sections.length} розділів`;
  document.getElementById("progressFill").style.width = (visited.size/sections.length*100)+"%";
}

function goHome(){
  currentView = "welcome";
  renderAll();
  window.scrollTo(0,0);
}

function openSection(i){
  currentSection = i;
  currentView = "section";
  renderAll();
  window.scrollTo(0,0);
}

function goToTest(){
  if(visited.size < sections.length) return;
  currentView = "test";
  currentQ = 0;
  renderAll();
  window.scrollTo(0,0);
}

/* =========================================================
   MAIN RENDER — WELCOME
   ========================================================= */
function renderWelcomeView(){
  const tilesHtml = sections.map((s,i)=>{
    const done = visited.has(i);
    return `<div class="tile" onclick="openSection(${i})">
      <div class="tile-ic" style="background:${s.color};color:${s.iconColor}">${done?'✓':s.emoji}</div>
      <div>
        <div class="tile-num">Розділ ${i+1}</div>
        <div class="tile-title">${s.title}</div>
      </div>
    </div>`;
  }).join("");

  main.innerHTML = `
    <div class="hero">
      <div class="hero-emoji">📚</div>
      <h1>Раді вітати вас у новому семестрі!</h1>
      <p>Зібрали тут основні правила роботи в BEA — коротко і по суті. Знайдіть, будь ласка, ~10 хвилин, щоб спокійно пройтися по розділах, а наприкінці — фінальний тест, щоб закріпити 🙂</p>
      <button class="btn btn-primary" onclick="openSection(0)">Почати онбординг →</button>
    </div>
    <h3 style="margin:0 0 14px;color:var(--bea-blue-deep);font-size:16px;">Що всередині</h3>
    <div class="tiles">${tilesHtml}</div>

}

/* =========================================================
   MAIN RENDER — SECTIONS
   ========================================================= */
function renderSectionView(){
  visited.add(currentSection);
  const s = sections[currentSection];
  const isLast = currentSection === sections.length-1;
  main.innerHTML = `
    <div class="eyebrow">Розділ ${currentSection+1} з ${sections.length}</div>
    <div class="page-head">
      <div class="page-icon" style="background:${s.color};">${s.emoji}</div>
      <div>
        <h1 class="page-title">${s.title}</h1>
        <p class="page-lede" style="margin-bottom:0;">${s.lede}</p>
      </div>
    </div>
    <div style="height:20px;"></div>
    ${s.html}
    <div class="footer-nav">
      <button class="btn btn-ghost" ${currentSection===0?'disabled':''} onclick="openSection(${currentSection-1})">← Назад</button>
      ${isLast
        ? `<button class="btn btn-primary" onclick="goToTest()">Перейти до тесту →</button>`
        : `<button class="btn btn-primary" onclick="openSection(${currentSection+1})">Далі →</button>`
      }
    </div>
  `;
}

/* =========================================================
   MAIN RENDER — QUIZ
   ========================================================= */
function renderTestView(){
  const q = quiz[currentQ];
  const pct = Math.round((currentQ)/quiz.length*100);
  const revealed = questionRevealed[currentQ];

  let bodyHtml = "";

  if(q.type==="single"){
    bodyHtml = q.options.map((opt,idx)=>{
      let cls = "opt";
      const selected = answers[currentQ]===idx;
      if(selected && !revealed) cls += " selected";
      if(revealed){
        if(idx===q.correct) cls += " result-correct";
        else if(selected) cls += " result-wrong";
      }
      return `<div class="${cls}" onclick="${revealed?'':`selectSingle(${idx})`}">
        <div class="mark">${(selected||(revealed&&idx===q.correct))?'✓':''}</div>
        <div>${opt}</div>
      </div>`;
    }).join("");
  }

  if(q.type==="multi"){
    bodyHtml = q.options.map((opt,idx)=>{
      let cls = "opt multi";
      const sel = answers[currentQ] || [];
      const selected = sel.includes(idx);
      if(selected && !revealed) cls += " selected";
      if(revealed){
        const isCorrect = q.correct.includes(idx);
        if(isCorrect && selected) cls += " result-correct";
        else if(isCorrect && !selected) cls += " result-missed";
        else if(!isCorrect && selected) cls += " result-wrong";
      }
      return `<div class="${cls}" onclick="${revealed?'':`toggleMulti(${idx})`}">
        <div class="mark">${selected?'✓':''}</div>
        <div>${opt}${revealed && isCorrectMissed(cls) ? ' <span style="color:#4CAF50;font-weight:700;font-size:12px;">— правильно, але ви не обрали</span>' : ''}</div>
      </div>`;
    }).join("");
  }

  function isCorrectMissed(cls){ return cls.includes("result-missed"); }

  if(q.type==="order"){
    if(!orderState || orderState.length!==q.items.length){
      orderState = answers[currentQ] ? [...answers[currentQ]] : q.items.map(it=>it.id);
    }
    bodyHtml = `<p class="quiz-hint" style="margin-top:-4px;">Перетягніть рядки (на комп'ютері) або скористайтеся стрілками ↑↓ (на телефоні).</p><ul class="order-list" id="orderList">` + orderState.map((id,pos)=>{
      const item = q.items.find(it=>it.id===id);
      let cls = "order-item";
      if(revealed){
        cls += (q.correctOrder[pos]===id) ? " result-correct" : " result-wrong";
      }
      return `<li class="${cls}" draggable="${!revealed}" data-id="${id}" ondragstart="dragStart(event)" ondragover="dragOver(event)" ondrop="dragDrop(event)" ondragend="dragEnd(event)">
        <span class="handle">⠿</span><span class="pos">${pos+1}</span><span style="flex:1;">${item.text}</span>
        ${revealed ? '' : `<span class="order-arrows">
          <button class="order-arrow-btn" ${pos===0?'disabled':''} onclick="moveOrderItem(${pos},-1)" aria-label="Вгору">↑</button>
          <button class="order-arrow-btn" ${pos===orderState.length-1?'disabled':''} onclick="moveOrderItem(${pos},1)" aria-label="Вниз">↓</button>
        </span>`}
      </li>`;
    }).join("") + `</ul>`;
  }

  if(q.type==="text"){
    const val = answers[currentQ] || "";
    bodyHtml = `<textarea class="quiz-text" id="textAnswer" placeholder="Ваша відповідь…" oninput="answers[${currentQ}]=this.value">${val}</textarea>`;
  }

  let explainHtml = "";
  if(revealed && q.type!=="text"){
    const isRight = isAnswerCorrect(currentQ);
    const phrase = isRight ? praiseOk[currentQ % praiseOk.length] : praiseBad[currentQ % praiseBad.length];
    explainHtml = `<div class="explain ${isRight?'ok':'bad'}">${phrase}</div>`;
  }

  const canCheck = q.type==="text" ? true : hasAnswer(currentQ);

  main.innerHTML = `
    <div class="eyebrow">📝 Тест на знання робочих процесів</div>
    <h1 class="page-title" style="margin-bottom:2px;">Питання ${currentQ+1} із ${quiz.length}</h1>
    <p class="page-lede" style="margin-bottom:20px;">Відповідайте спокійно — після кожного питання ви одразу побачите правильний варіант.</p>
    <div class="quiz-progress-wrap">
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
      <div class="quiz-progress-label">${pct}%</div>
    </div>
    <div class="quiz-card">
      <div class="quiz-section-tag">${q.section}</div>
      <div class="quiz-q">${q.q}</div>
      ${q.hint ? `<div class="quiz-hint">${q.hint}</div>` : ''}
      ${q.image ? `<img src="${q.image}" alt="Скріншот до питання" style="max-width:100%;border-radius:12px;border:1px solid #EEF0F3;margin-bottom:16px;display:block;">` : ''}
      ${bodyHtml}
      ${explainHtml}
    </div>
    <div class="footer-nav">
      <button class="btn btn-ghost" ${currentQ===0?'disabled':''} onclick="prevQuestion()">← Назад</button>
      ${revealed || q.type==="text"
        ? `<button class="btn btn-primary" onclick="nextQuestion()">${currentQ===quiz.length-1?'Завершити тест →':'Наступне питання →'}</button>`
        : `<button class="btn btn-primary" ${canCheck?'':'disabled'} onclick="checkAnswer()">Перевірити</button>`
      }
    </div>
  `;
}

function hasAnswer(i){
  const q = quiz[i];
  if(q.type==="single") return answers[i]!==null && answers[i]!==undefined;
  if(q.type==="multi") return answers[i] && answers[i].length>0;
  if(q.type==="order") return true;
  return true;
}

function selectSingle(idx){
  answers[currentQ] = idx;
  renderTestView();
}
function toggleMulti(idx){
  if(!answers[currentQ]) answers[currentQ] = [];
  const arr = answers[currentQ];
  const pos = arr.indexOf(idx);
  if(pos>=0) arr.splice(pos,1); else arr.push(idx);
  renderTestView();
}

function moveOrderItem(pos, dir){
  const newPos = pos + dir;
  if(newPos < 0 || newPos >= orderState.length) return;
  const tmp = orderState[pos];
  orderState[pos] = orderState[newPos];
  orderState[newPos] = tmp;
  answers[currentQ] = [...orderState];
  renderTestView();
}

let dragSrcId = null;
function dragStart(e){ dragSrcId = e.currentTarget.dataset.id; e.currentTarget.classList.add("dragging"); }
function dragEnd(e){ e.currentTarget.classList.remove("dragging"); }
function dragOver(e){ e.preventDefault(); }
function dragDrop(e){
  e.preventDefault();
  const targetId = e.currentTarget.dataset.id;
  if(targetId===dragSrcId) return;
  const srcId = parseInt(dragSrcId);
  const tgtId = parseInt(targetId);
  const srcIdx = orderState.indexOf(srcId);
  const tgtIdx = orderState.indexOf(tgtId);
  orderState.splice(srcIdx,1);
  orderState.splice(tgtIdx,0,srcId);
  answers[currentQ] = [...orderState];
  renderTestView();
}

function isAnswerCorrect(i){
  const q = quiz[i];
  if(q.type==="single") return answers[i]===q.correct;
  if(q.type==="multi"){
    const sel = (answers[i]||[]).slice().sort();
    const cor = q.correct.slice().sort();
    return JSON.stringify(sel)===JSON.stringify(cor);
  }
  if(q.type==="order"){
    return JSON.stringify(answers[i])===JSON.stringify(q.correctOrder);
  }
  return true;
}

function checkAnswer(){
  if(quiz[currentQ].type==="order"){
    answers[currentQ] = [...orderState];
  }
  questionRevealed[currentQ] = true;
  renderTestView();
}

function nextQuestion(){
  orderState = null;
  if(currentQ < quiz.length-1){
    currentQ++;
    renderTestView();
  } else {
    currentView = "results";
    renderAll();
  }
  window.scrollTo(0,0);
}
function prevQuestion(){
  orderState = null;
  if(currentQ>0){ currentQ--; renderAll(); window.scrollTo(0,0); }
}

function buildReportPayload(){
  const scorable = quiz.map((q,i)=>({q,i})).filter(o=>o.q.type!=="text");
  let correctCount = 0;
  scorable.forEach(o=>{ if(isAnswerCorrect(o.i)) correctCount++; });
  const total = scorable.length;
  const textAnswer = quiz.findIndex(q=>q.type==="text");

  const details = quiz.map((q,i)=>{
    let userAnsText = "", correctAnsText = "";
    if(q.type==="single"){
      userAnsText = (answers[i]!==null && answers[i]!==undefined) ? q.options[answers[i]] : "—";
      correctAnsText = q.options[q.correct];
    } else if(q.type==="multi"){
      const sel = answers[i]||[];
      userAnsText = sel.length ? sel.map(idx=>q.options[idx]).join("; ") : "—";
      correctAnsText = q.correct.map(idx=>q.options[idx]).join("; ");
    } else if(q.type==="order"){
      const seq = answers[i]||[];
      userAnsText = seq.join(" → ");
      correctAnsText = q.correctOrder.join(" → ");
    } else if(q.type==="text"){
      userAnsText = answers[i] || "—";
      correctAnsText = "";
    }
    return {
      section: q.section, question: q.q, type: q.type,
      userAnswer: userAnsText, correctAnswer: correctAnsText,
      isCorrect: q.type==="text" ? null : isAnswerCorrect(i)
    };
  });

  return {
    name: userName,
    email: userEmail,
    submittedAt: new Date().toISOString(),
    score: correctCount,
    total: total,
    pct: Math.round(correctCount/total*100),
    managerNames: textAnswer>=0 ? (answers[textAnswer]||"") : "",
    details: details
  };
}

async function sendReport(){
  reportSaveStatus = "saving";
  renderReportStatusOnly();
  const payload = buildReportPayload();
  try{
    const res = await fetch(REPORT_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    reportSaveStatus = res.ok ? "saved" : "failed";
  } catch(err){
    reportSaveStatus = "failed";
  }
  window.__lastReportPayload = payload;
  renderReportStatusOnly();
}

function renderReportStatusOnly(){
  const el = document.getElementById("reportStatusBox");
  if(el) el.outerHTML = reportStatusHtml();
}

function reportStatusHtml(){
  if(reportSaveStatus==="saving"){
    return `<div class="report-status sending" id="reportStatusBox">⏳ Зберігаємо ваш результат…</div>`;
  }
  if(reportSaveStatus==="saved"){
    return `<div class="report-status sent" id="reportStatusBox">✅ Результат збережено — менеджер його побачить.</div>`;
  }
  if(reportSaveStatus==="failed"){
    return `<div class="report-status failed" id="reportStatusBox">⚠️ Не вдалося автоматично зберегти результат. Натисніть «Скопіювати звіт» і надішліть його менеджеру вручну. <button class="btn btn-ghost" style="padding:6px 14px;font-size:12px;margin-left:8px;" onclick="copyReport()">📋 Скопіювати звіт</button></div>`;
  }
  return `<div id="reportStatusBox"></div>`;
}

function copyReport(){
  const p = window.__lastReportPayload || buildReportPayload();
  const lines = [
    `Онбординг BEA — результат тесту`,
    `Ім'я: ${p.name}`, `Email: ${p.email}`, `Дата: ${p.submittedAt}`,
    `Бал: ${p.score}/${p.total} (${p.pct}%)`,
    `Менеджери проєктів: ${p.managerNames}`,
    ``, `Деталі:`,
    ...p.details.map(d=>`[${d.isCorrect===null?'—':(d.isCorrect?'✅':'❌')}] ${d.question} | Відповідь: ${d.userAnswer}${d.correctAnswer?` | Правильно: ${d.correctAnswer}`:''}`)
  ];
  const text = lines.join("\n");
  navigator.clipboard.writeText(text).then(()=>{
    alert("Звіт скопійовано в буфер обміну — надішліть його менеджеру.");
  }).catch(()=>{
    alert("Не вдалося скопіювати автоматично. Відкрийте консоль розробника, там є повний звіт.");
    console.log(text);
  });
}

/* =========================================================
   RESULTS
   ========================================================= */
function renderResultsView(){
  const scorable = quiz.map((q,i)=>({q,i})).filter(o=>o.q.type!=="text");
  let correctCount = 0;
  scorable.forEach(o=>{ if(isAnswerCorrect(o.i)) correctCount++; });
  const total = scorable.length;
  const pct = Math.round(correctCount/total*100);

  let msg = "", emoji="";
  if(pct===100){ msg = "Ідеально! Ви на 100% готові до перших уроків."; emoji="🎉"; }
  else if(pct>=85){ msg = "Дуже добре — ще трохи повторити слабкі місця."; emoji="👏"; }
  else if(pct>=60){ msg = "Непогано! Варто повернутися до кількох розділів онбордингу."; emoji="🙂"; }
  else { msg = "Радимо ще раз пройти розділи онбордингу перед тестом."; emoji="📚"; }

  const reviewHtml = scorable.map(o=>{
    const right = isAnswerCorrect(o.i);
    const q = o.q;
    let userAnsText = "";
    let correctAnsText = "";
    if(q.type==="single"){
      userAnsText = (answers[o.i]!==null && answers[o.i]!==undefined) ? q.options[answers[o.i]] : "—";
      correctAnsText = q.options[q.correct];
    } else if(q.type==="multi"){
      const sel = answers[o.i]||[];
      userAnsText = sel.length ? sel.map(idx=>q.options[idx]).join("; ") : "—";
      correctAnsText = q.correct.map(idx=>q.options[idx]).join("; ");
    } else if(q.type==="order"){
      const seq = answers[o.i]||[];
      userAnsText = seq.map(id=>id).join(" → ");
      correctAnsText = q.correctOrder.join(" → ");
    }
    return `<div class="review-item ${right?'right':'wrong'}">
      <div class="review-q">${right?'✅':'❌'} ${q.q}</div>
      <div class="review-a"><b>Ваша відповідь:</b> ${userAnsText}</div>
      ${!right ? `<div class="review-a"><b>Правильна відповідь:</b> ${correctAnsText}</div>` : ''}
    </div>`;
  }).join("");

  main.innerHTML = `
    <div class="eyebrow">🏁 Результат</div>
    <h1 class="page-title">Тест на знання робочих процесів завершено</h1>
    ${reportStatusHtml()}
    <div class="score-hero">
      <div class="score-emoji">${emoji}</div>
      <span class="score-num">${correctCount}</span><span class="score-total">/${total}</span>
      <div class="score-msg">${msg}</div>
    </div>
    <h3 style="margin:24px 0 12px;color:var(--bea-blue-deep);">Розбір відповідей</h3>
    ${reviewHtml}

    <div class="feedback-card">
      <h3 style="margin:0 0 6px;font-size:15px;"><span class="ic">💬</span>Маєте що сказати?</h3>
      <p>Анонімний фідбек — про онбординг чи взагалі про будь-що. Ми не бачимо, хто його залишив.</p>
      <button class="btn btn-ghost" style="margin-top:10px;" onclick="goToFeedback()">Залишити анонімний фідбек →</button>
    </div>

    <div class="footer-nav">
      <button class="btn btn-ghost" onclick="restartTest()">↺ Пройти тест ще раз</button>
      <button class="btn btn-primary" onclick="goHome()">На головну</button>
    </div>
  `;

  if(reportSaveStatus==="idle"){
    sendReport();
  }
}

function restartTest(){
  answers = new Array(quiz.length).fill(null);
  questionRevealed = new Array(quiz.length).fill(false);
  currentQ = 0;
  reportSaveStatus = "idle";
  currentView = "test";
  renderAll();
  window.scrollTo(0,0);
}

/* =========================================================
   ANONYMOUS FEEDBACK
   ========================================================= */
function goToFeedback(){
  currentView = "feedback";
  renderAll();
  window.scrollTo(0,0);
}

function setFeedbackRating(n){
  feedbackRating = n;
  renderFeedbackView();
}

function renderFeedbackView(){
  if(feedbackStatus==="sent"){
    main.innerHTML = `
      <div class="feedback-card feedback-thanks">
        <div class="emoji">🙏</div>
        <h3 style="margin:0 0 6px;">Дякуємо за фідбек!</h3>
        <p style="margin:0;">Ми не бачимо, хто його залишив, — форма повністю анонімна.</p>
      </div>
      <div class="footer-nav" style="justify-content:center;">
        <button class="btn btn-primary" onclick="goHome()">На головну</button>
      </div>
    `;
    return;
  }

  const stars = [1,2,3,4,5].map(n=>
    `<button class="star-btn ${n<=feedbackRating?'active':''}" onclick="setFeedbackRating(${n})">⭐</button>`
  ).join("");

  main.innerHTML = `
    <div class="eyebrow">💬 Анонімний фідбек</div>
    <h1 class="page-title">Анонімний фідбек</h1>
    <p class="page-lede">Ми не бачимо ваші відповіді — форма повністю анонімна. Можете написати не тільки про онбординг, а взагалі про будь-що: роботу платформи, трекер, комунікацію з менеджерами, ідеї чи незручності — все, чим хочете поділитися.</p>
    <div class="feedback-card">
      <p style="margin-bottom:0;">Оцінка (необов'язково):</p>
      <div class="stars">${stars}</div>
      <textarea class="quiz-text" id="feedbackTextarea" placeholder="Про онбординг, роботу, ідеї, незручності — все, чим хочете поділитися…" oninput="feedbackText=this.value">${feedbackText}</textarea>
      ${feedbackStatus==="failed" ? `<div class="report-status failed" style="margin-top:14px;">⚠️ Не вдалося надіслати. Спробуйте ще раз.</div>` : ""}
    </div>
    <div class="footer-nav">
      <button class="btn btn-ghost" onclick="goHome()">Пропустити</button>
      <button class="btn btn-primary" ${feedbackStatus==="sending"?"disabled":""} onclick="sendFeedback()">${feedbackStatus==="sending"?"Надсилаємо…":"Надіслати фідбек →"}</button>
    </div>
  `;
}

async function sendFeedback(){
  if(feedbackRating===0 && !feedbackText.trim()){
    goHome();
    return;
  }
  feedbackStatus = "sending";
  renderFeedbackView();
  try{
    const res = await fetch("/api/submit-feedback", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        rating: feedbackRating,
        feedback: feedbackText.trim(),
        submittedAt: new Date().toISOString()
      })
    });
    feedbackStatus = res.ok ? "sent" : "failed";
  } catch(err){
    feedbackStatus = "failed";
  }
  renderFeedbackView();
}

/* =========================================================
   ROOT RENDER
   ========================================================= */
function renderAll(){
  if(currentView==="gate"){
    renderGateView();
    return;
  }
  renderSidebar();
  if(currentView==="welcome") renderWelcomeView();
  else if(currentView==="section") renderSectionView();
  else if(currentView==="test") renderTestView();
  else if(currentView==="feedback") renderFeedbackView();
  else renderResultsView();
}

renderAll();
</script>
